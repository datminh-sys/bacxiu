<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WARNING: DATA TERMINATION</title>
  <style>
    :root {
      --danger-color: #ff3e3e;
      --bg-color: #0d0000;
    }

    body {
      background-color: var(--bg-color);
      color: var(--danger-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    /* Hiệu ứng nhấp nháy đỏ toàn màn hình mờ */
    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(255, 62, 62, 0.05) 0%, transparent 70%);
      animation: alert-pulse 2s infinite;
      z-index: -1;
    }

    @keyframes alert-pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.7; }
      100% { opacity: 0.3; }
    }

    .delete-container {
      width: 450px;
      border: 3px solid var(--danger-color);
      padding: 40px;
      background: rgba(0, 0, 0, 0.95);
      box-shadow: 0 0 30px rgba(255, 62, 62, 0.3);
      text-align: center;
      position: relative;
    }

    /* Ký hiệu cảnh báo */
    .warning-icon {
      font-size: 50px;
      margin-bottom: 20px;
      animation: blink 0.8s infinite;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      border-bottom: 1px solid var(--danger-color);
      padding-bottom: 10px;
    }

    p {
      line-height: 1.6;
      margin-bottom: 30px;
      font-weight: bold;
    }

    .target-data {
      color: #fff;
      background: rgba(255, 62, 62, 0.2);
      padding: 5px 10px;
      display: inline-block;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 15px;
      background: var(--danger-color);
      color: #fff;
      border: none;
      font-family: inherit;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      margin-bottom: 15px;
    }

    button:hover {
      background: #fff;
      color: #000;
      box-shadow: 0 0 20px #fff;
    }

    .cancel-btn {
      display: inline-block;
      color: var(--danger-color);
      text-decoration: none;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.7;
      transition: 0.3s;
    }

    .cancel-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.1; }
    }

    .system-log {
      position: absolute;
      bottom: -30px;
      left: 0;
      font-size: 10px;
      text-align: left;
      width: 100%;
      color: rgba(255, 62, 62, 0.5);
    }
  </style>
</head>
<body>

  <div class="delete-container">
    <div class="warning-icon">⚠</div>
    <h2>XÁC NHẬN TIÊU HỦY</h2>
    
    <p>
      HÀNH ĐỘNG GHI ĐÈ HỆ THỐNG ĐANG ĐƯỢC THỰC THI.<br>
      BẠN CÓ CHẮC CHẮN MUỐN XÓA VĨNH VIỄN:<br>
      <span class="target-data">"{{ product.name|upper }}"</span>
    </p>

    <form method="post">
      {% csrf_token %}
      <button type="submit">XÁC NHẬN TRUY QUÉT (PURGE)</button>
    </form>
    
    <a href="{% url 'list_products' %}" class="cancel-btn">>> HỦY LỆNH & QUAY LẠI <<</a>

    <div class="system-log">
      STATUS: WAITING_FOR_USER_CONFIRMATION... <br>
      ACTION: PERMANENT_DATABASE_REMOVAL
    </div>
  </div>

</body>
</html>
